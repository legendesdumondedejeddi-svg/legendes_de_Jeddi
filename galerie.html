{% extends "layout.html" %}
{% block title %}Galerie — {{ lang|upper }}{% endblock %}

{% block content %}
<h2>Galerie</h2>
<p>Images uploadées (automatique depuis l'admin)</p>

<div class="galerie-grid">
    {% for img in images %}
        <div class="galerie-card">
            <a href="{{ url_for('uploaded_file', filename=img) }}" target="_blank">
                <img src="{{ url_for('static', filename='uploads/' + img) }}" alt="{{ img }}">
            </a>
            <div class="card-caption">{{ img }}</div>
        </div>
    {% endfor %}
    {% if not images %}
        <p>Aucune image pour le moment.</p>
    {% endif %}
</div>

<style>
.galerie-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:18px;max-width:1100px;margin:18px auto}
.galerie-card{background:#fff7eb;padding:8px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.12);text-align:center}
.galerie-card img{width:100%;height:150px;object-fit:cover;border-radius:6px}
.card-caption{font-size:13px;margin-top:8px;color:#4b3527}
</style>
{% endblock %}
