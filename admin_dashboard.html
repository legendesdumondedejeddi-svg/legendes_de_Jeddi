{% extends "layout.html" %}

{% block title %}Admin{% endblock %}

{% block content %}
<h2>Panneau Admin ({{ lang }})</h2>

<p><a href="/{{ lang }}/admin/add">Ajouter une légende</a></p>

<ul>
  {% for l in legendes %}
    <li>{{ l.id }} — {{ l.titre }} {% if l.categorie %}({{ l.categorie }}){% endif %}</li>
  {% endfor %}
</ul>
{% endblock %}
