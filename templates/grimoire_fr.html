{% extends "layout.html" %}
{% block title %}Grimoire — FR{% endblock %}

{% block content %}
<h2>Grimoire des Légendes</h2>

<section class="grimoire-area">
  <div class="parchment-corner">
    <div class="legend-text">
      {{ legend_text|default("(Aucune légende pour le moment)")|safe }}
    </div>
  </div>

  <div class="pagination">
    <a href="/{{ lang }}/legendes?page=prev">← Précédent</a>
    <a href="/{{ lang }}/legendes?page=next">Suivant →</a>
  </div>
</section>
{% endblock %}
