{% extends "layout.html" %}
{% block content %}
  <h1>Ajouter / Mettre à jour une légende</h1>

  <form method="post" enctype="multipart/form-data">
    <label>Langue :</label>
    <select name="lang">
      <option value="fr" {% if lang=='fr' %}selected{% endif %}>FR</option>
      <option value="en" {% if lang=='en' %}selected{% endif %}>EN</option>
      <option value="es" {% if lang=='es' %}selected{% endif %}>ES</option>
      <option value="de" {% if lang=='de' %}selected{% endif %}>DE</option>
      <option value="it" {% if lang=='it' %}selected{% endif %}>IT</option>
    </select>

    <label>Slug (identifiant, sans espaces) :</label>
    <input type="text" name="slug" required>

    <label>Titre :</label>
    <input type="text" name="titre" required>

    <label>Texte (HTML autorisé, safe) :</label>
    <textarea name="texte" rows="8" required></textarea>

    <label>Catégorie :</label>
    <input type="text" name="categorie">

    <label>Image (optionnelle) :</label>
    <input type="file" name="image" accept="image/*">

    <label>Mot de passe admin :</label>
    <input type="password" name="password" required>

    <button type="submit">Publier / Mettre à jour</button>
  </form>
{% endblock %}
