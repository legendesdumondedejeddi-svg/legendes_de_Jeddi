{% extends "layout.html" %}
{% block content %}
  <h2>{{ t.get('admin_add') }}</h2>

  <form method="post" enctype="multipart/form-data">
    <label>{{ t.get('field_lang') }}</label>
    <select name="lang">
      <option value="fr">FR</option>
      <option value="en">EN</option>
      <option value="es">ES</option>
      <option value="de">DE</option>
      <option value="it">IT</option>
    </select>

    <label>{{ t.get('field_slug') }}</label>
    <input type="text" name="slug" required>

    <label>{{ t.get('field_title') }}</label>
    <input type="text" name="titre" required>

    <label>{{ t.get('field_text') }}</label>
    <textarea name="texte" rows="8" required></textarea>

    <label>{{ t.get('field_category') }}</label>
    <input type="text" name="categorie">

    <label>{{ t.get('field_image') }}</label>
    <input type="file" name="image" accept="image/*">

    <label>{{ t.get('admin_password') }}</label>
    <input type="password" name="password" required>

    <button type="submit">{{ t.get('publish') }}</button>
  </form>
{% endblock %}
