{% extends "layout.html" %}
{% block title %}Admin enchanté{% endblock %}

{% block content %}
<h2>✨ Administration des Légendes</h2>

<p>Bienvenue, gardien des récits. Ici tu peux écrire et enchanter les légendes.</p>

<form method="POST" enctype="multipart/form-data" class="admin-form">

    <label>Titre de la légende :</label>
    <input type="text" name="titre" required>

    <label>Texte de la légende :</label>
    <textarea name="texte" rows="10" required></textarea>

    <label>Image liée (optionnel) :</label>
    <input type="file" name="image">

    <label>Mot de passe :</label>
    <input type="password" name="password" required>

    <button type="submit">✨ Enregistrer la légende</button>
</form>

<style>
.admin-form {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 80%;
    margin: auto;
}

.admin-form input, .admin-form textarea {
    padding: 10px;
    border: 2px solid #cfa96a;
    background: #fff7e6;
    font-family: "Georgia", serif;
}

.admin-form button {
    padding: 10px;
    font-size: 18px;
    background: #d6b06e;
    border: none;
    cursor: pointer;
}
</style>

{% endblock %}
