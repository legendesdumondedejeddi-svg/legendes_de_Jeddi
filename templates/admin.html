{% extends "layout.html" %}
{% block title %}Admin — Légendes ({{ lang.upper() }}){% endblock %}
{% block content %}

<h2>Administration des légendes — {{ lang.upper() }}</h2>

<form method="POST">
    <label>Écrire ou modifier vos légendes :</label><br>
    <textarea name="raw_legends" rows="20" style="width:100%;">{{ raw_legends }}</textarea>
    <br><br>
    <button type="submit">💾 Enregistrer</button>
</form>

{% endblock %}
