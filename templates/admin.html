{% extends "layout.html" %}
{% block title %}Admin — Légendes{% endblock %}
{% block content %}
<h2>Admin — Édition des légendes ({{ lang }})</h2>

<p>Format : <code>Titre</code> en première ligne, contenu ensuite. Séparez par une ligne vide puis <code>---</code>.</p>

<form method="post" enctype="multipart/form-data">
  <label>Texte complet (raw) :</label><br>
  <textarea name="raw_legends" style="min-height:300px;width:100%;">{{ raw_legends }}</textarea><br><br>

  <label>Ajouter / remplacer une image pour une légende</label><br>
  <input type="text" name="title_for_image" placeholder="Titre exact de la légende (pour nommer l'image)"><br>
  <input type="file" name="image" accept="image/*"><br><br>

  <input type="password" name="password" placeholder="Mot de passe admin"><br><br>

  <button type="submit">Enregistrer</button>
</form>
{% endblock %}
