{% extends "layout.html" %}
{% block content %}
  <h1>Admin</h1>
  {% if not session.get('logged_in') %}
    <form method="post" action="{{ url_for('page', lang=lang, page='admin') }}">
      <div class="form-row"><input name="username" placeholder="Nom d'utilisateur"></div>
      <div class="form-row"><input name="password" type="password" placeholder="Mot de passe"></div>
      <div class="form-row"><button class="btn">Connexion</button></div>
    </form>
    <p class="article">Login par défaut: <strong>admin</strong> / <strong>admin</strong> (changez le mot de passe après).</p>
  {% else %}
    <p class="article">Vous êtes connecté en tant qu'admin.</p>
    <p><a class="btn" href="{{ url_for('logout') }}">Se déconnecter</a></p>
  {% endif %}
{% endblock %}
