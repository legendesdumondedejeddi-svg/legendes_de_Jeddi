{% extends "layout.html" %}
{% block title %}Admin — Légendes{% endblock %}

{% block content %}
<h2>✨ Administration des Légendes ({{ lang|upper }})</h2>

<p>Écris une nouvelle légende, ajoute une image (optionnel) puis clique Enregistrer.</p>

<form method="POST" enctype="multipart/form-data" class="admin-form">
    <label>Titre :</label>
    <input type="text" name="titre" required>

    <label>Texte :</label>
    <textarea name="texte" rows="8" required></textarea>

    <label>Image (png/jpg/gif/webp) : </label>
    <input type="file" name="image" accept="image/*">

    <label>Mot de passe admin :</label>
    <input type="password" name="password" required>

    <button type="submit">✨ Enregistrer la légende</button>
</form>
{% endblock %}
