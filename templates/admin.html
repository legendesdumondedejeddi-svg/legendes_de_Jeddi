{% extends "layout.html" %}
{% block content %}

<h2>Administration</h2>

<form method="POST" enctype="multipart/form-data" class="formulaire-admin">
    <label>Mot de passe admin :</label>
    <input type="password" name="password" required>

    <label>Titre :</label>
    <input type="text" name="titre" required>

    <label>Texte :</label>
    <textarea name="texte" required></textarea>

    <label>Catégorie :</label>
    <input type="text" name="categorie" placeholder="ex: mythes, dragons, forêt..." required>

    <label>Image :</label>
    <input type="file" name="image">

    <button type="submit">Ajouter</button>
</form>

<hr>

<h3>Légendes existantes :</h3>

<ul>
{% for l in legendes %}
    <li>{{ l.id }} – {{ l.titre }} ({{ l.categorie }})</li>
{% endfor %}
</ul>

{% endblock %}
