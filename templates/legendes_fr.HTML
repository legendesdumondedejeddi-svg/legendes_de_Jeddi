{% extends "layout.html" %}
{% block title %}Légendes{% endblock %}
{% block content %}
<h1>Légendes</h1>

<div class="legend-container">
    <p>{{ legend_text|safe }}</p>
</div>

<div class="pagination">
    {% if page > 1 %}
        <a href="/fr/legendes?page={{ page - 1 }}">← Précédent</a>
    {% endif %}

    <span>Page {{ page }} / {{ pages }}</span>

    {% if page < pages %}
        <a href="/fr/legendes?page={{ page + 1 }}">Suivant →</a>
    {% endif %}
</div>

{% endblock %}
