{% extends "layout.html" %}
{% block content %}
<h1>List of legends</h1>

<ul>
    {% for l in legends %}
    <li>
        <a href="/legende/{{ l.slug }}?lang=fr">{{ l.title }}</a>
    </li>
    {% endfor %}
</ul>

{% if page > 1 %}
<a href="/legendes?page={{ page - 1 }}&lang=fr">Page précédente</a>
{% endif %}

{% if (page * per_page) < total %}
<a href="/legendes?page={{ page + 1 }}&lang=fr">Page suivante</a>
{% endif %}
{% endblock %}
