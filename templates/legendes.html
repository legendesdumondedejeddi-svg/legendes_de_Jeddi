{% extends "layout.html" %}
{% block title %}Légendes{% endblock %}
{% block content %}

<h2>Légendes</h2>

{% for legend in legends %}
<article style="margin-bottom:40px;">
    <h3>{{ legend.title }}</h3>

    {% if legend.image %}
    <img src="{{ url_for('static', filename=legend.image) }}" class="legend-image">
    {% endif %}

    <p>{{ legend.content | safe }}</p>
</article>
<hr>
{% endfor %}

{% endblock %}
