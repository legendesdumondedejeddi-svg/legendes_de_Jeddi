{% extends "layout.html" %}
{% block title %}Légendes — {{ lang.upper() }}{% endblock %}
{% block content %}

<h2>{{ legend.title }}</h2>

<p>{{ legend.content }}</p>

<div style="margin-top:20px;">
    {% if page > 1 %}
    <a href="/{{ lang }}/legendes?page={{ page-1 }}">⬅ Légende précédente</a>
    {% endif %}

    {% if page < pages %}
    <a href="/{{ lang }}/legendes?page={{ page+1 }}" style="float:right;">Légende suivante ➡</a>
    {% endif %}
</div>

{% endblock %}
