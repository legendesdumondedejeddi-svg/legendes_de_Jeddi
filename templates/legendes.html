{% extends "layout.html" %}
{% block content %}

<h2>{{ leg.titre }}</h2>

{% if leg.image %}
<img src="{{ url_for('static', filename='images/' + leg.image) }}"
     alt="{{ leg.titre }}"
     style="max-width:300px">
{% endif %}

<p>{{ leg.contenu }}</p>

<a href="{{ url_for('liste_legendes') }}">Retour</a>

{% endblock %}
