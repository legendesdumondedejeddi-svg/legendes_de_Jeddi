{% extends "layout.html" %}
{% block title %}Galerie magique{% endblock %}

{% block content %}
<h2>✨ Galerie des Images ✨</h2>

<div class="galerie">
    {% for img in images %}
        <div class="galerie-item">
            <img src="{{ url_for('static', filename='uploads/' + img) }}" alt="{{ img }}">
        </div>
    {% endfor %}
</div>

<style>
.galerie {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

.galerie-item img {
    width: 260px;
    height: auto;
    border: 3px solid #cfa96a;
    box-shadow: 0 0 12px rgba(0,0,0,0.25);
    border-radius: 6px;
}
</style>

{% endblock %}
