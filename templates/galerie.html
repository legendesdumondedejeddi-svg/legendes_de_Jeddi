{% extends "layout.html" %}
{% block title %}Galerie{% endblock %}
{% block content %}

<h2>Galerie magique</h2>

{% if images %}
<div class="gallery-grid">
    {% for im in images %}
    <figure class="card">
        <img src="{{ url_for('static', filename=im) }}">
        <figcaption>{{ im.split('/')[-1] }}</figcaption>
    </figure>
    {% endfor %}
</div>
{% else %}
<p>Aucune image pour l’instant.</p>
{% endif %}

{% endblock %}
