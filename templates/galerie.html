{% extends "layout.html" %}
{% block title %}Galerie magique{% endblock %}

{% block content %}
<h2>✨ Galerie des Légendes</h2>

<div class="galerie">
    {% for img in images %}
        <div class="galerie-item">
            <img src="{{ url_for('static', filename='uploads/' + img.filename) }}" alt="">
            <p>{{ img.title }}</p>
        </div>
    {% endfor %}
</div>

<style>
.galerie {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

.galerie-item {
    text-align: center;
    background: rgba(255,255,255,0.7);
    padding: 10px;
    border-radius: 12px;
    box-shadow: 0 0 10px #bfa27a;
    transition: transform 0.3s;
}

.galerie-item:hover {
    transform: scale(1.05);
}

.galerie-item img {
    width: 100%;
    border-radius: 10px;
} 
</style>

{% endblock %}
