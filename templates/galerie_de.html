{% extends "layout.html" %}
{% block title %}Galerie — DE{% endblock %}

{% block content %}
<h2>✨ Bildergalerie</h2>

<div class="gallery-grid">
    {% for image in images %}
        <div class="gallery-item">
            <img src="{{ url_for('static', filename='images/galerie/' ~ image) }}" alt="">
        </div>
    {% else %}
        <p>Noch keine Bilder.</p>
    {% endfor %}
</div>

{% endblock %}
