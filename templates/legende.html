{% extends "layout.html" %}
{% block content %}

<article class="fiche-legende">

    {% if legende.image %}
    <img class="medaillon-grand" src="{{ url_for('static', filename='images/' + legende.image) }}" alt="{{ legende.titre }}">
    {% endif %}

    <h2 class="titre-legende">{{ legende.titre }}</h2>
    <p class="categorie">Catégorie : {{ legende.categorie }}</p>
    <p class="texte-legende">{{ legende.texte }}</p>

</article>

{% endblock %}
