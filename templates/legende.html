{% extends "layout.html" %}
{% block content %}

<h1>{{ legende.title }}</h1>

<div class="legende-header">
    <img src="{{ url_for('static_files', path='img/grimoire.png') }}" alt="Grimoire" class="grimoire-img">
</div>

<p class="legende-texte">
    {{ legende.texte | safe }}
</p>

{% if legende.image %}
<div class="legende-image">
    <img src="{{ url_for('static_files', path='img/' + legende.image) }}" alt="Illustration légende">
</div>
{% endif %}

{% endblock %}
