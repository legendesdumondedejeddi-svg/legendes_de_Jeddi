{% extends "layout.html" %}
{% block title %}Galería — ES{% endblock %}

{% block content %}
<h2>✨ Galería de imágenes</h2>

<div class="gallery-grid">
    {% for image in images %}
        <div class="gallery-item">
            <img src="{{ url_for('static', filename='images/galerie/' ~ image) }}" alt="">
        </div>
    {% else %}
        <p>No hay imágenes todavía.</p>
    {% endfor %}
</div>

{% endblock %}
