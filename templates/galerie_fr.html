{% extends "layout.html" %}
{% block title %}Galerie — FR{% endblock %}

{% block content %}
<h2>✨ Galerie d’illustrations</h2>

<div class="gallery-grid">
    {% for image in images %}
        <div class="gallery-item">
            <img src="{{ url_for('static', filename='images/galerie/' ~ image) }}" alt="">
        </div>
    {% else %}
        <p>Aucune image pour le moment.</p>
    {% endfor %}
</div>

{% endblock %}
