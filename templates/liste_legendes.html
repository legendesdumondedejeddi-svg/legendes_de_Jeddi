{% extends "layout.html" %}
{% block content %}

<h2>Liste des légendes</h2>

<ul>
    {% for leg in legendes %}
        <li>
            <a href="{{ url_for('legende_detail', id=leg.id) }}">
                {{ leg.titre }}
            </a>
        </li>
    {% endfor %}
</ul>

{% endblock %}
