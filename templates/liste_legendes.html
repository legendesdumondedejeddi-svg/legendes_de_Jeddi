{% extends "layout.html" %}

{% block title %}Liste des légendes{% endblock %}

{% block content %}

<h1>Liste des légendes</h1>

<ul>
    {% for item in legendes %}
        <li>
            <a href="{{ url_for('legende', slug=item.slug) }}">
                {{ item.titre }}
            </a>
        </li>
    {% endfor %}
</ul>

{% endblock %}
