<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Légendes{% endblock %}</title>

    <!-- Style enchanté -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Script JS -->
    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</head>

<body class="parchment">

<header class="banner-header">

    <!-- Bannière image (si tu veux une image en haut, mets-la ici) -->
    <img src="{{ url_for('static', filename='images/licorne.png') }}"
         alt="Bannière Licorne" class="banner-image">

    <h1>Bannière Licorne</h1>

    <nav class="navbar">
        <ul>
            <li><a href="/{{ lang }}/accueil">Accueil</a></li>
            <li><a href="/{{ lang }}/apropos">À propos</a></li>

            <li>
                Pages ▾
                <ul>
                    <li><a href="/{{ lang }}/jeddi">Jeddi</a></li>
                    <li><a href="/{{ lang }}/galerie">Galerie</a></li>
                    <li><a href="/{{ lang }}/grimoire">Grimoire</a></li>
                    <li><a href="/{{ lang }}/don">Don</a></li>
                    <li><a href="/{{ lang }}/legendes">Légendes</a></li>
                </ul>
            </li>

            <li>
                Langue ▾
                <ul>
                    <li><a href="/fr/accueil">FR</a></li>
                    <li><a href="/en/accueil">EN</a></li>
                    <li><a href="/es/accueil">ES</a></li>
                    <li><a href="/de/accueil">DE</a></li>
                    <li><a href="/it/accueil">IT</a></li>
                </ul>
            </li>
        </ul>
    </nav>

</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <img src="{{ url_for('static', filename='images/licorne.gif') }}"
         alt="Licorne animée"
         class="footer-licorne">
    <p>© Légendes du Monde de Jeddi</p>
</footer>

</body>
</html>
