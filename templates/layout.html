<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Légendes{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="background"></div>

<header>
    <img src="{{ url_for('static', filename='images/licorne.gif') }}" alt="Licorne" class="banner-licorne">

    <h1 class="site-title">Légendes du Monde de Jeddi</h1>

    <nav>
        <ul class="menu">
            <li><a href="/{{ lang }}/accueil">Accueil</a></li>
            <li><a href="/{{ lang }}/apropos">À propos</a></li>

            <li class="dropdown">Pages
                <ul class="submenu">
                    <li><a href="/{{ lang }}/jeddi">Jeddi</a></li>
                    <li><a href="/{{ lang }}/galerie">Galerie</a></li>
                    <li><a href="/{{ lang }}/grimoire">Grimoire</a></li>
                    <li><a href="/{{ lang }}/don">Don</a></li>
                    <li><a href="/{{ lang }}/legendes">Légendes</a></li>
                </ul>
            </li>

            <li class="dropdown">Langue
                <ul class="submenu">
                    <li><a href="/fr/accueil">FR</a></li>
                    <li><a href="/en/accueil">EN</a></li>
                    <li><a href="/es/accueil">ES</a></li>
                    <li><a href="/de/accueil">DE</a></li>
                    <li><a href="/it/accueil">IT</a></li>
                </ul>
            </li>
        </ul>
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <img src="{{ url_for('static', filename='images/licorne.gif') }}" alt="licorne" class="footer-licorne">
    <p>© Légendes du Monde de Jeddi</p>
</footer>

</body>
</html>
