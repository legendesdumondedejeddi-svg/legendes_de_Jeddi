<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Légendes du Monde de Jeddi{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header class="banner-header">
    <img src="{{ url_for('static', filename='images/licorne.png') }}" alt="Bannière Licorne" class="banner-image">
</header>

<nav class="navbar">
    <ul>
        <li><a href="/{{ lang }}/accueil">Accueil</a></li>
        <li><a href="/{{ lang }}/apropos">À propos</a></li>
        <li class="dropdown">
            <a href="#">Pages ▾</a>
            <div class="dropdown-content">
                <a href="/{{ lang }}/jeddi">Jeddi</a>
                <a href="/{{ lang }}/galerie">Galerie</a>
                <a href="/{{ lang }}/grimoire">Grimoire</a>
                <a href="/{{ lang }}/don">Don</a>
                <a href="/{{ lang }}/legendes">Légendes</a>
            </div>
        </li>
        <li class="dropdown">
            <a href="#">Langue ▾</a>
            <div class="dropdown-content">
                <a href="/fr{{ request.path }}">FR</a>
                <a href="/en{{ request.path }}">EN</a>
                <a href="/es{{ request.path }}">ES</a>
                <a href="/de{{ request.path }}">DE</a>
                <a href="/it{{ request.path }}">IT</a>
            </div>
        </li>
    </ul>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<img src="{{ url_for('static', filename='images/licorne.gif') }}" alt="Licorne animée" class="footer-licorne">

<footer>
    <p>© Légendes du Monde de Jeddi</p>
</footer>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
