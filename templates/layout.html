<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "Légendes de Jeddi" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="parchemin">
    <header class="header-grimoire">
        <h1 class="titre-grimoire">Légendes de Jeddi</h1>

        <nav class="menu">
            <a href="{{ url_for('accueil') }}">Accueil</a>
            <a href="{{ url_for('list_legendes') }}">Légendes</a>
            <a href="{{ url_for('admin') }}">Admin</a>
        </nav>
    </header>

    <main class="contenu">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-zone">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="pied-grimoire">
        © Légendes de Jeddi
    </footer>
</body>
</html>
