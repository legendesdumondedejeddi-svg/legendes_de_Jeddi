<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="UTF-8">
<title>{% block title %}Jeddi{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header class="top-banner">
    <img src="{{ url_for('static', filename='images/licorne.gif') }}" class="banner-unicorn">
    <h1>Légendes du Monde de Jeddi</h1>

    <nav>
        <ul>
            <li><a href="/{{ lang }}/accueil">Accueil</a></li>
            <li><a href="/{{ lang }}/apropos">À propos</a></li>

            <li class="submenu">Pages ▼
                <ul>
                    <li><a href="/{{ lang }}/jeddi">Jeddi</a></li>
                    <li><a href="/{{ lang }}/galerie">Galerie</a></li>
                    <li><a href="/{{ lang }}/grimoire">Grimoire</a></li>
                    <li><a href="/{{ lang }}/don">Don</a></li>
                    <li><a href="/{{ lang }}/legendes">Légendes</a></li>
                </ul>
            </li>

            <li class="submenu">Langue ▼
                <ul>
                    {% for L in ["fr","en","es","de","it"] %}
                    <li><a href="/{{ L }}/accueil">{{ L|upper }}</a></li>
                    {% endfor %}
                </ul>
            </li>
        </ul>
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <img src="{{ url_for('static', filename='images/licorne.gif') }}" class="footer-unicorn">
    <p>© Légendes du Monde de Jeddi</p>
</footer>

</body>
</html>
