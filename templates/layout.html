<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "Légendes de Jeddi" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="parchemin">
    <!-- BANNIÈRE : licorne.png -->
    <header class="header-grimoire">
        <div class="banner-wrap">
            <img src="{{ url_for('static', filename='images/licorne.png') }}" alt="Licorne" class="banner-image">
            <h1 class="titre-grimoire">Légendes de Jeddi</h1>
        </div>

        <nav class="menu">
            <a href="{{ url_for('accueil') }}">Accueil</a>
            <a href="{{ url_for('list_legendes') }}">Légendes</a>
            <a href="{{ url_for('admin') }}">Admin</a>
            <a href="https://www.paypal.com/donate" class="bouton-don" target="_blank">Don</a>
        </nav>
    </header>

    <main class="contenu">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-zone">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="pied-grimoire" aria-hidden="true">
        <p>© Légendes de Jeddi</p>

        <!-- LICORNE ANIMÉE : licorne.gif (fixe en bas, visible sur toutes les pages) -->
        <img src="{{ url_for('static', filename='images/licorne.gif') }}" alt="" class="footer-licorne">
    </footer>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const licorne = document.querySelector(".footer-licorne");
    if (licorne) {
        licorne.addEventListener("click", () => {
            licorne.classList.toggle("stop");
        });
    }
});
</script>
</body>
</html>
