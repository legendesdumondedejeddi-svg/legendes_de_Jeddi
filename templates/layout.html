<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Légendes du Monde de Jeddi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- Bouton mode nuit -->
<button id="darkModeToggle" class="dark-toggle">✨ Mode Nuit Magique</button>

<!-- Bannière licorne -->
<header class="banner">
    <img src="{{ url_for('static', filename='images/licorne.png') }}" alt="Bannière Licorne">
</header>

<!-- Menu fixe -->
<nav class="menu">
    <a href="{{ url_for('index') }}">Accueil</a>
    <a href="{{ url_for('don') }}">Don</a>
    <a href="{{ url_for('apropos') }}">À propos de Jeddi</a>
    <a href="{{ url_for('grimoire') }}">Grimoire</a>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<!-- Licorne gif qui galope -->
<div class="running-unicorn" onclick="this.classList.toggle('pause')">
    <img src="{{ url_for('static', filename='images/licorne.gif') }}" alt="Unicorn Running">
</div>

<script>
/* Mode nuit */
document.getElementById("darkModeToggle").onclick = () => {
    document.body.classList.toggle("dark-mode");
};
</script>

</body>
</html>
