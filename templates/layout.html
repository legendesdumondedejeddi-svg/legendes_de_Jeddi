<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "Légendes du Monde de Jeddi" }}</title>
    <link rel="stylesheet" href="{{ url_for('static_files', path='css/style.css') }}">
</head>

<body class="light-mode">

    <!-- Bandeau licorne -->
    <header class="banner">
        <img src="{{ url_for('static_files', path='img/licorne.png') }}" alt="Licorne bannière">
    </header>

    <!-- Menu fixe -->
    <nav class="menu">
        <a href="/fr/accueil">Accueil</a>
        <a href="/fr/legendes">Légendes</a>
        <a href="/fr/grimoire">Grimoire</a>
        <a href="/fr/don">Don</a>
        <a href="/fr/apropos">À propos</a>
    </nav>

    <!-- Bouton mode nuit -->
    <button id="mode-toggle" class="night-toggle">Mode Nuit</button>

    <!-- Licorne qui galope -->
    <div class="galloping-licorne">
        <img src="{{ url_for('static_files', path='img/licorne.gif') }}" id="licorne-gif" alt="Licorne qui galope">
    </div>

    <main class="content">
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>Nous contacter : <a href="mailto:legendes.du.monde.de.jeddi@gmail.com">legendes.du.monde.de.jeddi@gmail.com</a></p>
    </footer>

    <script>
        // Mode Nuit
        document.getElementById("mode-toggle").onclick = function () {
            document.body.classList.toggle("dark-mode");
        };

        // Stopper la licorne au clic
        document.getElementById("licorne-gif").onclick = function () {
            this.style.animationPlayState = "paused";
        };
    </script>

</body>
</html>
